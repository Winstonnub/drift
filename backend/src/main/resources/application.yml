spring: # top level Spring config namespace, application contains drift
  application:
    name: drift

  data:
    mongodb:
      uri: mongodb://drift:drift@localhost:27017/drift?authSource=admin
      auto-index-creation: true


server: # tells the embedded web server to listen on port 8080
  port: 8080


app: # app config namespace
    jwt: 
        secret: "local-dev-secret-key-local-dev-secret-key-local-dev-secret-key"
        access-token-expiration-minutes: 15
        refresh-token-expiration-days: 30 # longer, since they are used to get new access tokens